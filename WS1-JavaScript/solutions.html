    <h2>Exercise 1: Dog's Age</h2>
    <p>Open the console (F12) to see the results.</p>
    <script>
        // Exercise 1: Dog's Age
        // Function that accepts a person's age and returns their age in dog years
        // One human year = 7 dog years
        function calculateDogYears(humanAge) {
            return humanAge * 7;
        }
        
        // Test the function with various ages
        console.log("Exercise 1: Dog's Age");
        console.log("Dog years for age 5:", calculateDogYears(5));
        console.log("Dog years for age 10:", calculateDogYears(10));
        console.log("Dog years for age 25:", calculateDogYears(25));
        console.log("Dog years for age 50:", calculateDogYears(50));
    </script>
