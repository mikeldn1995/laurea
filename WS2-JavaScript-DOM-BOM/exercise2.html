<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 2 - Repeating Text</title>
</head>
<body>
    <script>
        function repeatingText(text) {
            for (var i = 0; i < 30; i++) {
                document.write(text + "<br>");
            }
        }

        repeatingText("Hello, World!");
    </script>
</body>
</html>
