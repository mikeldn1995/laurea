<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Elements</title>
</head>
<body>
    <h1>Dynamic Element Creation Demonstration</h1>
    <button id="addParagraphBtn">Add New Paragraph</button>
    <button id="addListItemBtn">Add New List Item</button>
    <ul id="myList">
        <li>Existing List Item 1</li>
    </ul>

    <script>
        var paragraphCount = 0;
        document.getElementById('addParagraphBtn').addEventListener('click', function() {
            // 1. Create new paragraph element
            var newParagraph = document.createElement('p');
            // 2. Add content and style
            paragraphCount += 1;
            newParagraph.textContent = 'Dynamically created paragraph number ' + paragraphCount;
            newParagraph.style.color = 'blue';
            // 3. Append the new paragraph to the end of the body
            document.body.appendChild(newParagraph);
        });

        var listItemCount = 1;
        document.getElementById('addListItemBtn').addEventListener('click', function() {
            // 1. Create new list item element
            var newListItem = document.createElement('li');
            // 2. Add content
            listItemCount += 1;
            newListItem.textContent = 'New List Item ' + listItemCount;
            // 3. Find the list and append the new item
            var myList = document.getElementById('myList');
            myList.appendChild(newListItem);
        });
    </script>
</body>
</html>
